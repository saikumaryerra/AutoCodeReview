# ============================================================================
# AutoCodeReview — Production Docker Compose
# ============================================================================
# Runs the compiled application behind a single container.
# Data (SQLite DB + cloned repos) persists in a named volume.
# Claude CLI auth is mounted read-only from the host user's home directory.
# ============================================================================
name: auto-code-review-prod
services:
  pr-review:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: auto-code-review
    restart: unless-stopped

    ports:
      - "${API_PORT:-9998}:${API_PORT:-9998}"

    env_file:
      - .env

    volumes:
      # Persistent data: database, cloned repos, logs
      - pr-review-data:/app/data
      # Claude CLI authentication — mounted read-write so container can refresh
      # OAuth tokens. The entrypoint symlinks these to the home directory with
      # correct permissions. Token refreshes inside the container are visible to
      # the host via the symlink.
      - ~/.claude:/mnt/claude-auth
      - ~/.claude.json:/mnt/claude-config.json

    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:${API_PORT:-9998}/api/v1/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    deploy:
      resources:
        limits:
          memory: 4g
          cpus: "2"

    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  pr-review-data:
    name: auto-code-review-data
